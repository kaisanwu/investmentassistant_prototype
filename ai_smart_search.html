<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>智能搜尋</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100dvh;
  background: #f0f2f5;
  display: flex; justify-content: center; align-items: flex-start;
  font-family: -apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif;
}
.shell {
  width: 390px;
  height: 100dvh; max-height: 844px;
  background: #fff;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* STATUS BAR */
.sbar { display:flex; justify-content:space-between; align-items:center; padding:16px 24px 6px; flex-shrink:0; }
.sbar-t { font-size:15px; font-weight:600; color:#0a1f44; }
.sbar-i { display:flex; gap:6px; align-items:center; }

/* TOP BAR */
.tbar { display:flex; align-items:center; justify-content:center; padding:4px 20px 12px; position:relative; flex-shrink:0; }
.tbar-title { font-size:17px; font-weight:600; color:#0a1f44; }
.tbar-r { position:absolute; right:20px; display:flex; gap:12px; }
.icon-btn {
  width:32px; height:32px; border-radius:50%;
  border:1.5px solid #c8d0de; background:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:background .15s;
}
.icon-btn:hover { background:#f0f3f8; }

/* WELCOME */
#screenWelcome { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.w-body { flex:1; padding:22px 28px 0; display:flex; flex-direction:column; }
.w-sub  { font-size:14px; color:#9aa4b5; margin-bottom:5px; }
.w-head { font-size:26px; font-weight:700; color:#0a1f44; line-height:1.25; letter-spacing:-.3px; margin-bottom:28px; }
.cat-list { display:flex; flex-direction:column; gap:12px; }
.cpill {
  display:inline-flex; align-items:center; align-self:flex-start;
  padding:12px 24px; border-radius:50px;
  background:#e8edf6; border:none;
  font-size:15px; font-weight:500; color:#0a1f44;
  cursor:pointer; white-space:nowrap;
  transition:background .15s, transform .1s;
}
.cpill:hover  { background:#d8e0f0; }
.cpill:active { transform:scale(.97); }

/* CHAT */
#screenChat { flex:1; display:none; flex-direction:column; overflow:hidden; }

.msgs {
  flex:1; overflow-y:auto;
  padding:16px 28px 0;
  display:flex; flex-direction:column; gap:16px;
}
.msgs::-webkit-scrollbar { width:0; }

/* Pinned tags */
.pin-wrap { flex-shrink:0; padding:12px 28px 0; }
.pin-row  { display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; }
.pin-row::-webkit-scrollbar { height:0; }
.ptag {
  flex-shrink:0; padding:7px 16px; border-radius:50px;
  background:#e8edf6; border:none;
  font-size:13px; font-weight:500; color:#0a1f44;
  cursor:pointer; white-space:nowrap; transition:background .15s;
}
.ptag:hover { background:#d8e0f0; }

/* INPUT BAR */
.ibar { flex-shrink:0; display:flex; align-items:center; gap:10px; padding:10px 20px calc(24px + env(safe-area-inset-bottom)); }
.ipill {
  flex:1; display:flex; align-items:center; gap:8px;
  height:50px; border-radius:50px;
  border:1.5px solid #dde1ea; background:#f7f8fb; padding:0 16px;
}
.ipill input {
  flex:1; border:none; background:transparent;
  font-size:14px; color:#0a1f44; outline:none; font-family:inherit;
}
.ipill input::placeholder { color:#b8c0cc; }
.mic-icon { display:flex; align-items:center; cursor:pointer; flex-shrink:0; }
.send-btn {
  width:44px; height:44px; border-radius:50%;
  background:#0a1f44; border:none; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .15s;
}
.send-btn:hover { opacity:.82; }

/* MESSAGES */
.msg-user {
  align-self:flex-end; max-width:76%;
  padding:10px 16px; border-radius:20px 20px 4px 20px;
  border:1.5px solid #c8d0de; background:#fff;
  font-size:14px; color:#0a1f44; line-height:1.55;
}
.msg-ai-wrap { align-self:flex-start; max-width:96%; display:flex; flex-direction:column; }
.msg-ai-body { font-size:16px; color:#0a1f44; line-height:1.75; white-space:pre-wrap; }

/* Feature detail */
.feat-detail {
  margin-top:8px; padding:12px 14px;
  background:#f5f7fb; border-radius:12px;
  font-size:13.5px; color:#3a4a62; line-height:1.65;
}
.feat-detail-title { font-size:14px; font-weight:700; color:#0a1f44; margin-bottom:4px; }
.feat-path { font-size:12px; color:#9aa4b5; margin-top:4px; }

/* CTA */
.cta-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.btn-primary {
  padding:9px 20px; border-radius:50px; background:#0a1f44; color:#fff;
  border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
  transition:opacity .15s; white-space:nowrap;
}
.btn-primary:hover { opacity:.82; }
.btn-secondary {
  padding:9px 20px; border-radius:50px; background:#fff; color:#0a1f44;
  border:1.5px solid #c8d0de; font-size:13px; font-weight:500;
  cursor:pointer; font-family:inherit; transition:background .15s; white-space:nowrap;
}
.btn-secondary:hover { background:#f0f3f8; }

/* Disambig */
.disambig-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.btn-disambig {
  padding:9px 20px; border-radius:50px; background:#e8edf6; color:#0a1f44; border:none;
  font-size:13px; font-weight:500; cursor:pointer; font-family:inherit;
  transition:background .15s; white-space:nowrap;
}
.btn-disambig:hover { background:#d8e0f0; }

/* ── FEEDBACK BAR ── */
.feedback-bar {
  display:flex; align-items:center; gap:5px; margin-top:10px;
}
.fb-btn {
  display:flex; align-items:center; justify-content:center;
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid #e2e6ef; background:#fff;
  cursor:pointer; flex-shrink:0;
  transition:background .15s, border-color .15s;
  padding:0;
}
.fb-btn:hover:not(:disabled) { background:#f0f3f8; border-color:#c8d0de; }
.fb-btn:disabled { cursor:default; }

/* liked state */
.fb-btn.liked { background:#eaf1ff; border-color:#0a1f44; }
.fb-btn.liked .fb-icon-stroke { stroke:#0a1f44; }

/* disliked state */
.fb-btn.disliked { background:#fff4f4; border-color:#d94f4f; }
.fb-btn.disliked .fb-icon-stroke { stroke:#d94f4f; }

.fb-label {
  font-size:11.5px; color:#b0b8c8;
  margin-left:2px; user-select:none;
  transition:color .2s;
}
.fb-label.fb-done { color:#5a6478; font-weight:500; }

/* Typing */
.typing-dots { display:flex; gap:5px; padding:2px 0; align-items:center; }
.typing-dots span { width:7px; height:7px; background:#9aa4b5; border-radius:50%; animation:tdot 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes tdot { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
</style>
</head>

      "密碼中心":"確認交易密碼是否鎖定、過期或需要重設，密碼異常也會阻擋下單"

const CAT_REPLY = {
  "功能":    "我可以協助您快速找到所需功能。只需輸入關鍵字或描述您的需求，我將一步步引導您，精準定位對應的功能。",
  "商品":    "請輸入商品名稱、股票代號或關鍵字，我將為您快速查詢。",
  "新聞":    "請輸入關鍵字或主題，例如「台積電最新消息」「Fed 升降息」，我將彙整最新動態。",
  "到價通知":"您目前的到價通知：\n・台積電 (2330)：目標價 $1,050\n・聯發科 (2454)：目標價 $1,200\n\n需要新增或修改通知嗎？",
};
const CAT_LABEL = {"商品":"查找商品","功能":"搜尋功能","新聞":"搜尋新聞動態","到價通知":"查看到價通知"};

/* IDs that should NOT show a feedback bar */
const NO_FEEDBACK_IDS = new Set(["cat-功能"]);

let screen = "welcome", activeCat = null;
const $ = id => document.getElementById(id);

/* ── Feedback bar ──
   showFeedback = true/false
   Uses clean SVG icons: thumbs-up (hand) + ✕ circle for dislike
*/
function buildFeedbackBar() {
  const bar = document.createElement("div");
  bar.className = "feedback-bar";

  /* Thumbs Up — classic hand icon */
  const upBtn = document.createElement("button");
  upBtn.className = "fb-btn";
  upBtn.title = "有幫助";
  upBtn.innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
      <path class="fb-icon-stroke"
        d="M14 9V5a3 3 0 00-3-3L7 14v7h11.3a2 2 0 002-1.7l1.4-8a2 2 0 00-2-2.3H14z
           M7 14H4.7A2.3 2.3 0 002.4 16v3.7C2.4 21 3.4 22 4.7 22H7"
        stroke="#9aa4b5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

  /* Thumbs Down — hand flipped vertically */
  const downBtn = document.createElement("button");
  downBtn.className = "fb-btn";
  downBtn.title = "沒幫助";
  downBtn.innerHTML = `
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
      <path class="fb-icon-stroke"
        d="M10 15v4a3 3 0 003 3l4-9V2H5.7a2 2 0 00-2 1.7l-1.4 8a2 2 0 002 2.3H10z
           M17 2h2.3A2.3 2.3 0 0121.6 4v3.7c0 1.3-1 2.3-2.3 2.3H17"
        stroke="#9aa4b5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

  const label = document.createElement("span");
  label.className = "fb-label";
  label.textContent = "這則回覆有幫助嗎？";

  function lock() { upBtn.disabled = true; downBtn.disabled = true; }

  upBtn.addEventListener("click", () => {
    upBtn.classList.add("liked");
    upBtn.querySelector(".fb-icon-stroke").setAttribute("stroke", "#0a1f44");
    label.textContent = "感謝您的反饋！";
    label.classList.add("fb-done");
    lock();
  });

  downBtn.addEventListener("click", () => {
    downBtn.classList.add("disliked");
    downBtn.querySelector(".fb-icon-stroke").setAttribute("stroke", "#d94f4f");
    label.textContent = "感謝您的反饋，我們會持續優化。";
    label.classList.add("fb-done");
    lock();
  });

  bar.appendChild(upBtn);
  bar.appendChild(downBtn);
  bar.appendChild(label);
  return bar;
}

/* ── DOM helpers ── */
function scrollBot() {
  const el = $("msgList");
  if (el) setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
}

function appendUser(text) {
  const d = document.createElement("div"); d.className = "msg-user"; d.textContent = text;
  $("msgList").appendChild(d); scrollBot();
}

/*
  appendAI(text, extraEl, feedbackId)
  feedbackId: pass a string to suppress feedback for that id (NO_FEEDBACK_IDS)
              pass nothing / null to always show feedback
*/
function appendAI(text, extraEl, feedbackId) {
  const wrap = document.createElement("div"); wrap.className = "msg-ai-wrap";
  if (text) {
    const body = document.createElement("div"); body.className = "msg-ai-body"; body.textContent = text;
    wrap.appendChild(body);
  }
  if (extraEl) wrap.appendChild(extraEl);

  /* Only add feedback bar if NOT in suppressed set */
  const suppress = feedbackId && NO_FEEDBACK_IDS.has(feedbackId);
  if (!suppress) wrap.appendChild(buildFeedbackBar());

  $("msgList").appendChild(wrap); scrollBot();
}

function showTyping() {
  const w = document.createElement("div"); w.className = "msg-ai-wrap"; w.id = "typing";
  const d = document.createElement("div"); d.className = "typing-dots";
  d.innerHTML = "<span></span><span></span><span></span>";
  w.appendChild(d); $("msgList").appendChild(w); scrollBot();
}
function hideTyping() { const e = $("typing"); if (e) e.remove(); }

/* ── Feature card ── */
function buildFeatCard(key) {
  const f = FEATURES[key], wrap = document.createElement("div");
  const det = document.createElement("div"); det.className = "feat-detail";
  if (f.category) {
    const cat = document.createElement("div");
    cat.style.cssText = "font-size:11px;font-weight:600;color:#6b7fa3;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;";
    cat.textContent = f.category;
    det.appendChild(cat);
  }
  const dt  = document.createElement("div"); dt.className  = "feat-detail-title"; dt.textContent = f.title;
  const dd  = document.createElement("div"); dd.textContent = f.desc;
  const dp  = document.createElement("div"); dp.className  = "feat-path"; dp.textContent = "路徑：" + f.path;
  det.appendChild(dt); det.appendChild(dd); det.appendChild(dp);
  const row = document.createElement("div"); row.className = "cta-row";
  const goBtn = document.createElement("button"); goBtn.className = "btn-primary"; goBtn.textContent = "前往使用";
  goBtn.onclick = () => { appendUser("前往使用「"+f.title+"」"); setTimeout(() => appendAI("正在為您導航至「"+f.title+"」……"), 400); };
  const favBtn = document.createElement("button"); favBtn.className = "btn-secondary"; favBtn.textContent = "設為常用功能";
  favBtn.onclick = () => { favBtn.textContent="已設為常用 ✓"; favBtn.disabled=true; favBtn.style.opacity=".5"; setTimeout(() => appendAI("已將「"+f.title+"」設為常用功能！可以到「我的」快捷功能查看！"), 300); };
  row.appendChild(goBtn); row.appendChild(favBtn);
  wrap.appendChild(det); wrap.appendChild(row);
  return wrap;
}

/* ── Disambig card ── */
/* hints = optional object { featureKey: hintText }
   With hints  → rich card stack (title + one-line description)
   Without hints → simple pill row */
function buildDisambigCard(keys, hints) {
  if (hints) {
    const stack = document.createElement("div");
    stack.style.cssText = "display:flex;flex-direction:column;gap:8px;margin-top:10px;";
    keys.forEach(key => {
      const f = FEATURES[key]; if (!f) return;
      const card = document.createElement("button");
      card.style.cssText =
        "display:flex;flex-direction:column;align-items:flex-start;" +
        "padding:11px 14px;border-radius:14px;" +
        "background:#f5f7fb;border:1.5px solid #e2e6ef;" +
        "text-align:left;cursor:pointer;font-family:inherit;width:100%;" +
        "transition:background .15s,border-color .15s;";
      card.onmouseover = () => { card.style.background="#eef1f7"; card.style.borderColor="#c8d0de"; };
      card.onmouseout  = () => { card.style.background="#f5f7fb"; card.style.borderColor="#e2e6ef"; };

      const ttl = document.createElement("div");
      ttl.style.cssText = "font-size:13.5px;font-weight:600;color:#0a1f44;margin-bottom:3px;";
      ttl.textContent = f.title;
      card.appendChild(ttl);

      if (hints[key]) {
        const ht = document.createElement("div");
        ht.style.cssText = "font-size:12.5px;color:#5a6478;line-height:1.5;";
        ht.textContent = hints[key];
        card.appendChild(ht);
      }

      card.onclick = () => {
        appendUser(f.title); showTyping();
        setTimeout(() => { hideTyping(); appendAI("為您找到「"+f.title+"」的詳細說明：", buildFeatCard(key)); }, 750);
      };
      stack.appendChild(card);
    });
    return stack;
  }

  // Simple pill row
  const row = document.createElement("div"); row.className = "disambig-row";
  keys.forEach(key => {
    const f = FEATURES[key]; if (!f) return;
    const btn = document.createElement("button"); btn.className = "btn-disambig"; btn.textContent = f.title;
    btn.onclick = () => {
      appendUser(f.title); showTyping();
      setTimeout(() => { hideTyping(); appendAI("為您找到「"+f.title+"」的詳細說明：", buildFeatCard(key)); }, 750);
    };
    row.appendChild(btn);
  });
  return row;
}

/* ── Intent engine ── */
function norm(s) { return s.toLowerCase().replace(/\s/g,""); }
function matchIntent(input) {
  const q = norm(input);
  for (const grp of DISAMBIG_GROUPS)
    if (grp.triggers.some(t => q.includes(norm(t)))) return { type:"disambig", group:grp };
  let bestKey = null, bestScore = 0;
  for (const [key, f] of Object.entries(FEATURES)) {
    let score = 0;
    for (const kw of f.keywords) if (q.includes(norm(kw))) score += kw.length;
    if (score > bestScore) { bestScore = score; bestKey = key; }
  }
  if (bestKey && bestScore > 0) return { type:"direct", key:bestKey };
  return { type:"none" };
}

/* ── Process text ── */
function processText(text) {
  appendUser(text); showTyping();
  setTimeout(() => {
    hideTyping();
    const r = matchIntent(text);
    if (r.type === "direct") {
      appendAI("為您找到「"+FEATURES[r.key].title+"」的詳細說明：", buildFeatCard(r.key));
    } else if (r.type === "disambig") {
      // Pass hints if the group defines them (rich cards), else simple pills
      appendAI(r.group.reply, buildDisambigCard(r.group.features, r.group.hints || null));
    } else {
      appendAI("目前還沒找到對應功能！可以跟我多說一點你的使用情境嗎？我幫你更精準找看看！");
    }
  }, 900);
}

/* ── Screen transition ── */
function goToChat(cat) {
  if (screen === "chat") return;
  screen = "chat"; activeCat = cat;
  $("screenWelcome").style.display = "none";
  $("screenChat").style.display    = "flex";
  if (cat) {
    appendUser(CAT_LABEL[cat] || cat); showTyping();
    const feedbackId = cat === "功能" ? "cat-功能" : null;
    setTimeout(() => { hideTyping(); appendAI(CAT_REPLY[cat] || "請輸入您的需求。", null, feedbackId); }, 700);
  }
}

function tapTag(cat) {
  activeCat = cat;
  appendUser(CAT_LABEL[cat] || cat); showTyping();
  const feedbackId = cat === "功能" ? "cat-功能" : null;
  setTimeout(() => { hideTyping(); appendAI(CAT_REPLY[cat] || "請輸入您的需求。", null, feedbackId); }, 700);
}

/* ── Send ── */
function handleSend(id) {
  const el = $(id), text = el.value.trim(); if (!text) return; el.value = "";
  if (screen === "welcome") { goToChat(null); setTimeout(() => processText(text), 300); }
  else processText(text);
}

/* ── Bindings ── */
document.querySelectorAll(".cpill").forEach(b => b.addEventListener("click", () => goToChat(b.dataset.c)));
document.querySelectorAll(".ptag").forEach(t  => t.addEventListener("click", () => tapTag(t.dataset.c)));
$("wSendBtn").addEventListener("click",  () => handleSend("wInput"));
$("wInput").addEventListener("keydown",  e  => { if (e.key==="Enter") handleSend("wInput"); });
$("cSendBtn").addEventListener("click",  () => handleSend("cInput"));
$("cInput").addEventListener("keydown",  e  => { if (e.key==="Enter") handleSend("cInput"); });
$("xBtn").addEventListener("click", () => {
  window.location.href = "首頁.html";
});

/* ── Demo: 點擊輸入框自動觸發示範問句（每個輸入框只觸發一次） ── */
const DEMO_PROMPT = "我想要在 2330 元買到台積電";
let demoFired = false;
function fireDemo() {
  if (demoFired) return;
  demoFired = true;
  // 取消聚焦避免行動裝置跳出鍵盤
  document.activeElement && document.activeElement.blur();
  if (screen === "welcome") { goToChat(null); setTimeout(() => processText(DEMO_PROMPT), 300); }
  else processText(DEMO_PROMPT);
}
$("wInput").addEventListener("focus", fireDemo);
$("cInput").addEventListener("focus", fireDemo);
</script>
