<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>自選股</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Helvetica Neue', sans-serif;
    background: #dde1e8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    border-radius: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.28);
  }

  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    z-index: 0;
    pointer-events: none;
    user-select: none;
    display: block;
  }

  .ai-btn {
    position: absolute;
    top: 32px;
    right: 78px;
    width: 77px;
    height: 77px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    cursor: pointer;
    z-index: 2;
    transition: background 0.14s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .ai-btn:active {
    background: rgba(0, 82, 204, 0.13);
    transform: scale(0.9);
  }

  .ai-panel {
    position: absolute;
    top: 94px;
    right: 14px;
    left: 14px;
    background: rgba(255,255,255,0.97);
    border-radius: 14px;
    box-shadow: 0 8px 36px rgba(0,0,0,0.18);
    padding: 15px 14px 13px;
    z-index: 10;
    display: none;
    border: 0.5px solid rgba(0,82,204,0.13);
  }

  .ai-panel.visible {
    display: block;
    animation: fadeSlide 0.17s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: #0052CC;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .close-btn {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    cursor: pointer;
    color: #bbb;
    font-size: 14px;
    line-height: 1;
  }
  .close-btn:active { background: #eee; }

  .stat-row {
    display: flex;
    gap: 7px;
    margin-bottom: 10px;
  }

  .stat-card {
    flex: 1;
    background: #f3f6ff;
    border-radius: 9px;
    padding: 8px 5px;
    text-align: center;
    border: 0.5px solid rgba(0,82,204,0.08);
  }

  .stat-label {
    font-size: 10px;
    color: #999;
    margin-bottom: 3px;
  }

  .stat-value {
    font-size: 13px;
    font-weight: 600;
    color: #d93025;
  }

  .stat-value.blue-lg { color: #0052CC; }
  .stat-value.blue { color: #0052CC; font-size: 13px; }

  .insight-box {
    background: #fff9e5;
    border-radius: 9px;
    padding: 9px 10px;
    font-size: 11.5px;
    color: #5a3e00;
    line-height: 1.65;
    border: 0.5px solid rgba(180,130,0,0.17);
  }

  .insight-tag {
    display: inline-block;
    background: rgba(0,82,204,0.09);
    color: #0052CC;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    margin-bottom: 4px;
  }

  /* === Hint Bubble === */
  .hint-bubble {
    position: absolute;
    left: 50%;
    top: calc(100% - 18px);
    transform: translateX(calc(-50% - 70px));
    background: #4E97FF;
    color: #FFFFFF;
    font-size: 13px;
    font-weight: normal;
    white-space: nowrap;
    max-width: 320px;
    overflow: hidden;
    text-overflow: clip;
    padding: 6px 12px;
    border-radius: 20px;
    pointer-events: none;
    animation: bubble-float 2.6s ease-in-out infinite;
    transition: transform 0.2s ease;
    z-index: 3;
  }

  /* Arrow pointing upward from above 自選 */
  .hint-bubble::before {
    content: '';
    position: absolute;
    top: -9px;
    left: 78%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 9px solid #4E97FF;
  }

  .hint-bubble:hover {
    animation-play-state: paused;
    transform: translateX(calc(-50% - 70px)) scale(1.05);
  }

  @keyframes bubble-float {
    0%, 100% { transform: translateX(calc(-50% - 70px)) translateY(0); }
    50%       { transform: translateX(calc(-50% - 70px)) translateY(-5px); }
  }
</style>
</head>
